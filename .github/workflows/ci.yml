name: CLARA CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  repository-structure:
    name: Repository Structure Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          bash scripts/validate-repo-structure.sh

      - name: Check for committed env files
        run: |
          if find . -path "./.git" -prune -o \( -name ".env" -o -name ".env.local" -o -name ".env.production" \) -print | grep -q .; then
            echo "Do not commit environment files."
            exit 1
          fi

      - name: Check for obvious private key files
        run: |
          if find . -path "./.git" -prune -o \( -name "*.pem" -o -name "*.key" -o -name "id_rsa" -o -name "id_ed25519" \) -print | grep -q .; then
            echo "Possible private key file committed."
            exit 1
          fi

  api-bootstrap:
    name: API Bootstrap Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
